apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        grafana:
          adminPassword: admin123
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}

        prometheusOperator:
          admissionWebhooks:
            patch:
              enabled: false

        alertmanager:
          alertmanagerSpec:
            secrets:
              - alertmanager-smtp
          config:
            global:
              smtp_smarthost: smtp.gmail.com:587
              smtp_from: huynhbahuan@gmail.com
              smtp_auth_username: huynhbahuan@gmail.com
              smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp/smtp-password
              smtp_require_tls: true
            route:
              receiver: email
              group_by: ["alertname"]
              group_wait: 10s
              group_interval: 1m
              repeat_interval: 30m
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
            receivers:
              - name: "null"
              - name: email
                email_configs:
                  - to: huynhbahuan@gmail.com
                    send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

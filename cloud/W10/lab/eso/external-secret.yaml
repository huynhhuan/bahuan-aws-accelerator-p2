apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-password-es
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "30s" 
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-password-k8s 
    creationPolicy: Owner
  data:
    - secretKey: password 
      remoteRef:
        key: demo/db-password
        property: password
